aid: betterstack
name: Better Stack
description: >-
  Better Stack is a comprehensive infrastructure monitoring and observability
  platform combining uptime monitoring, log management, incident management,
  status pages, and AI-powered site reliability tools. This is an alias entry
  for the better-stack repository. See https://github.com/api-evangelist/better-stack
  for the full API profile with OpenAPI specs, capabilities, and vocabulary.
